<!DOCTYPE html>
<html>
<head>
<title>AI Image Predictor</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
color:white;
height:100vh;
overflow:hidden;
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bgmove 15s infinite;
display:flex;
align-items:center;
justify-content:center;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* floating particles */

.particle{
position:absolute;
width:4px;
height:4px;
background:white;
opacity:0.3;
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

.container{
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:20px;
width:420px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
text-align:center;
}

h1{
margin-top:0;
}

input{
margin-top:15px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00ffcc,#00c3ff);
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#preview{
max-width:250px;
margin-top:20px;
border-radius:10px;
display:none;
}

#result{
margin-top:20px;
font-size:18px;
}

.pred{
background:rgba(0,0,0,0.3);
margin:6px;
padding:8px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Image Predictor</h1>

<p>Upload an image and AI will detect it</p>

<input type="file" id="upload">

<br>

<img id="preview">

<br>

<button onclick="predict()">Predict Image</button>

<div id="result">Loading AI model...</div>

</div>

<script>

/* particles */

for(let i=0;i<60;i++){

let p=document.createElement("div")
p.className="particle"
p.style.left=Math.random()*100+"vw"
p.style.animationDuration=(5+Math.random()*10)+"s"
document.body.appendChild(p)

}

let model

async function load(){

model=await mobilenet.load()

document.getElementById("result").innerHTML="Model Ready ✔"

}

load()

upload.onchange=e=>{

let reader=new FileReader()

reader.onload=function(){

preview.src=reader.result
preview.style.display="block"

}

reader.readAsDataURL(e.target.files[0])

}

async function predict(){

result.innerHTML="AI analyzing image..."

const predictions=await model.classify(preview)

let html="<h3>Predictions</h3>"

predictions.forEach(p=>{

html+=`<div class="pred">
${p.className}
<br>
Confidence: ${(p.probability*100).toFixed(2)}%
</div>`

})

result.innerHTML=html

}

</script>

</body>
</html>
